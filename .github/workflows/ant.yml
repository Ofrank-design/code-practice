            System.out.println(GOLD  + "  [3]" + WHITE + " Purchase Order Manager        " + DIM + "→ Project 1" + RESET);
            System.out.println(GOLD  + "  [4]" + WHITE + " Contract Register             " + DIM + "→ Project 2" + RESET);
